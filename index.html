<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes — PWA</title>
  <meta name="theme-color" content="#1a1a2e"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="My Notes"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f4ef;
      --surface: #ffffff;
      --ink: #1a1a2e;
      --ink2: #6b6880;
      --accent: #c84b31;
      --accent2: #e8a87c;
      --border: #e2ddd6;
      --shadow: 0 4px 24px rgba(26,26,46,0.08);
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--ink);
      transition: background 0.4s, color 0.4s;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,75,49,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* DARK MODE */
    body.dark {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --ink: #f0ece4;
      --ink2: #9993b0;
      --border: #2a2a42;
      --shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    body.dark::before {
      background: radial-gradient(circle, rgba(232,168,124,0.06) 0%, transparent 70%);
    }

    .wrapper {
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .logo-area h1 {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.5px;
      color: var(--ink);
    }

    .logo-area h1 span {
      color: var(--accent);
    }

    .logo-area p {
      font-size: 13px;
      color: var(--ink2);
      margin-top: 6px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .dark-toggle {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 18px;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s, background 0.4s, border 0.4s;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .dark-toggle:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(200,75,49,0.15); }

    /* INPUT AREA */
    .input-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 32px;
      transition: background 0.4s, border 0.4s;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      resize: none;
      height: 60px;
      line-height: 1.6;
      padding: 4px 0;
      transition: color 0.3s;
    }

    textarea::placeholder { color: var(--ink2); }

    .save-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      width: 46px; height: 46px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 20px;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(200,75,49,0.3);
    }
    .save-btn:hover { transform: scale(1.07) translateY(-1px); box-shadow: 0 8px 20px rgba(200,75,49,0.4); }
    .save-btn:active { transform: scale(0.96); }

    .char-count {
      font-size: 11px;
      color: var(--ink2);
      text-align: right;
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      letter-spacing: 0.3px;
    }

    /* NOTES SECTION */
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .notes-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink2);
      letter-spacing: 0.2px;
    }

    .notes-count {
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 56px 20px;
      color: var(--ink2);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 14px; opacity: 0.5; }
    .empty-state p { font-size: 14px; font-weight: 300; letter-spacing: 0.3px; }

    /* NOTE CARDS */
    .notes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: transform 0.2s, box-shadow 0.2s, background 0.4s, border 0.4s, opacity 0.3s;
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .note-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(26,26,46,0.12); }
    body.dark .note-card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.4); }

    .note-index {
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
      padding-top: 2px;
      min-width: 20px;
      letter-spacing: 0.5px;
    }

    .note-text {
      flex: 1;
      font-size: 14.5px;
      line-height: 1.65;
      color: var(--ink);
      word-break: break-word;
      white-space: pre-wrap;
    }

    .note-time {
      font-size: 11px;
      color: var(--ink2);
      font-weight: 300;
      margin-top: 6px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--ink2);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      flex-shrink: 0;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s, transform 0.15s;
      opacity: 0.5;
    }
    .note-card:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--accent); background: rgba(200,75,49,0.08); transform: scale(1.15); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
      opacity: 0;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* INSTALL BANNER */
    .install-banner {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--ink);
      color: var(--bg);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 1000;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
    }
    .install-banner.show { transform: translateY(0); }
    .install-banner .ib-icon { font-size: 32px; flex-shrink: 0; }
    .install-banner .ib-text { flex: 1; }
    .install-banner .ib-text strong { display: block; font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .install-banner .ib-text span { font-size: 12px; opacity: 0.7; }
    .install-banner .ib-install {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      font-family: 'DM Sans', sans-serif;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .install-banner .ib-install:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(200,75,49,0.4); }
    .install-banner .ib-close {
      background: none;
      border: none;
      color: white;
      opacity: 0.5;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      padding: 4px;
    }
    .install-banner .ib-close:hover { opacity: 1; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="wrapper">

  <header>
    <div class="logo-area">
      <h1>My<span>.</span>Notes</h1>
      <p>Private · Offline-first · Always there</p>
    </div>
    <button class="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
  </header>

  <div class="input-card">
    <div class="input-row">
      <textarea id="noteInput" placeholder="What's on your mind…" maxlength="500" oninput="updateChar()"></textarea>
      <button class="save-btn" onclick="saveNote()" title="Save note">＋</button>
    </div>
    <div class="char-count" id="charCount">0 / 500</div>
  </div>

  <div class="notes-header">
    <h2>Saved Notes</h2>
    <span class="notes-count" id="notesCount">0</span>
  </div>

  <div id="notesList"></div>

</div>

<div class="toast" id="toast"></div>

<!-- PWA Install Banner -->
<div class="install-banner" id="installBanner">
  <div class="ib-icon">📝</div>
  <div class="ib-text">
    <strong>Install My Notes App</strong>
    <span>Home screen-ல add பண்ணி offline use பண்ணலாம்!</span>
  </div>
  <button class="ib-install" id="installBtn">Install</button>
  <button class="ib-close" onclick="dismissInstall()">✕</button>
</div>

<script>

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function updateChar() {
    const val = document.getElementById('noteInput').value.length;
    document.getElementById('charCount').textContent = `${val} / 500`;
  }

  function getNotes() {
    return JSON.parse(localStorage.getItem('notes_v2')) || [];
  }

  function setNotes(notes) {
    localStorage.setItem('notes_v2', JSON.stringify(notes));
  }

  function saveNote() {
    const input = document.getElementById('noteInput');
    const text = input.value.trim();
    if (!text) { showToast('✏️ Type something first!'); return; }

    const notes = getNotes();
    notes.unshift({ text, time: Date.now() });
    setNotes(notes);
    input.value = '';
    updateChar();
    showNotes();
    showToast('✅ Note saved!');
  }

  function deleteNote(index) {
    const notes = getNotes();
    notes.splice(index, 1);
    setNotes(notes);
    showNotes();
    showToast('🗑️ Note deleted');
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) +
           ' · ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  }

  function showNotes() {
    const notes = getNotes();
    const container = document.getElementById('notesList');
    document.getElementById('notesCount').textContent = notes.length;

    if (notes.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">📓</div>
          <p>No notes yet — add your first thought above</p>
        </div>`;
      return;
    }

    container.innerHTML = `<div class="notes-list">` +
      notes.map((n, i) => `
        <div class="note-card" id="card-${i}">
          <span class="note-index">${String(i+1).padStart(2,'0')}</span>
          <div style="flex:1">
            <div class="note-text">${escapeHtml(n.text)}</div>
            ${n.time ? `<div class="note-time">🕐 ${formatTime(n.time)}</div>` : ''}
          </div>
          <button class="delete-btn" onclick="deleteNote(${i})" title="Delete">✕</button>
        </div>`
      ).join('') +
    `</div>`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toggleDark() {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    document.querySelector('.dark-toggle').textContent = isDark ? '☀️' : '🌙';
    localStorage.setItem('darkMode', isDark ? '1' : '0');
  }

  // Init
  if (localStorage.getItem('darkMode') === '1') {
    document.body.classList.add('dark');
    document.querySelector('.dark-toggle').textContent = '☀️';
  }

  // Enter key to save (Shift+Enter for newline)
  document.getElementById('noteInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveNote(); }
  });

  showNotes();

  // ── MANIFEST (inline blob) ──────────────────────────────
  const manifestData = {
    name: "My Notes App",
    short_name: "My Notes",
    description: "Private offline notes app",
    start_url: "./",
    display: "standalone",
    background_color: "#f7f4ef",
    theme_color: "#1a1a2e",
    orientation: "portrait",
    icons: [
      {
        src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%231a1a2e'/><text x='96' y='130' font-size='110' text-anchor='middle' font-family='serif'>📝</text></svg>`),
        sizes: "192x192", type: "image/svg+xml", purpose: "any maskable"
      },
      {
        src: "data:image/svg+xml," + encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%231a1a2e'/><text x='256' y='360' font-size='300' text-anchor='middle' font-family='serif'>📝</text></svg>`),
        sizes: "512x512", type: "image/svg+xml", purpose: "any maskable"
      }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifestData)], { type: 'application/manifest+json' });
  const manifestLink = document.createElement('link');
  manifestLink.rel = 'manifest';
  manifestLink.href = URL.createObjectURL(manifestBlob);
  document.head.appendChild(manifestLink);

  // ── SERVICE WORKER ───────────────────────────────────────
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'notes-pwa-v2';
      self.addEventListener('install', e => { self.skipWaiting(); e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/']))); });
      self.addEventListener('activate', e => e.waitUntil(clients.claim()));
      self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(swBlob))
      .then(() => console.log('✅ SW registered'));
  }

  // ── INSTALL PROMPT ───────────────────────────────────────
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    setTimeout(() => {
      document.getElementById('installBanner').classList.add('show');
    }, 1500);
  });

  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') showToast('🎉 App installed successfully!');
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
  });

  function dismissInstall() {
    document.getElementById('installBanner').classList.remove('show');
    deferredPrompt = null;
  }

  window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').classList.remove('show');
    showToast('🎉 App installed!');
  });

</script>
</body>
</html>
